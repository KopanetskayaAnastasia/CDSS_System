services:
  db:
    image: postgres:15
    container_name: cdss_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cdss_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cdss_network

  api:
    build: .
    container_name: cdss_api
    restart: unless-stopped
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./chroma_db:/app/chroma_db
      - ./docs/clinical_guidelines:/app/docs/clinical_guidelines
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis  # если используете Redis
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - cdss_network

  streamlit:
    build: .
    container_name: cdss_streamlit
    restart: unless-stopped
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    ports:
      - "8510:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - cdss_network

volumes:
  postgres_data:
    name: cdss_postgres_data

networks:
  cdss_network:
    driver: bridge